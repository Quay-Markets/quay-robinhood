repos:
  - repo: local
    hooks:
      - id: forge-fmt
        name: forge fmt --check
        entry: forge fmt --check
        language: system
        files: '\.sol$'
        pass_filenames: false
      - id: forge-test
        name: forge test
        entry: forge test
        language: system
        files: '\.(sol|toml)$'
        pass_filenames: false
