[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
evm_version = "cancun"
optimizer = true
optimizer_runs = 10_000
deny = "warnings"
# Lets the SDK vector generator (test/SdkVectors.t.sol) refresh sdk/test-vectors.json
fs_permissions = [{ access = "write", path = "./sdk/test-vectors.json" }]

[lint]
# block.timestamp comparisons are core to the design: quote freshness, decay,
# and expiry are timestamp-driven by spec (see quay_evm_propamm_design.md §14.1).
exclude_lints = ["block-timestamp"]
# Lint gates production code; tests/scripts intentionally use bounded casts and warps.
ignore = ["test/**/*.sol", "script/**/*.sol"]

[fuzz]
runs = 1024

[invariant]
runs = 64
depth = 128
fail_on_revert = true

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
